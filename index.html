<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lotto Number Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="card">
      <p class="eyebrow">Lucky Pick</p>
      <h1>Lotto Number Generator</h1>
      <p class="description">Draw six unique numbers from 1 to 45, plus one bonus number.</p>

      <div class="numbers" id="numbers" aria-live="polite"></div>

      <div class="bonus-wrap">
        <span class="bonus-label">Bonus</span>
        <div class="bonus-number" id="bonus" aria-live="polite">?</div>
      </div>

      <button class="draw-button" id="drawButton" type="button">Draw Numbers</button>
      <p class="guide">Press the button to generate a new combination instantly.</p>

      <section class="contact-section" aria-labelledby="contact-title">
        <div class="contact-header">
          <p class="eyebrow">Partnership</p>
          <h2 id="contact-title">Partnership Inquiry</h2>
          <p class="contact-copy">Send your collaboration or advertising proposal and we will review it.</p>
        </div>

        <form class="contact-form" action="https://formspree.io/f/mqegagkw" method="POST">
          <label class="field">
            <span>Name</span>
            <input type="text" name="name" placeholder="Your name" required>
          </label>

          <label class="field">
            <span>Email</span>
            <input type="email" name="email" placeholder="name@example.com" required>
          </label>

          <label class="field">
            <span>Company</span>
            <input type="text" name="company" placeholder="Company or brand">
          </label>

          <label class="field">
            <span>Message</span>
            <textarea name="message" rows="5" placeholder="Tell us about your proposal." required></textarea>
          </label>

          <input type="hidden" name="_subject" value="New partnership inquiry">
          <button class="submit-button" type="submit">Send Inquiry</button>
        </form>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
